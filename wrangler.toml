# ShiftCare — Cloudflare Worker config
# Deploy: wrangler deploy
# Docs: https://developers.cloudflare.com/workers/

name       = "shiftcare"
main       = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Durable Objects (sincronização WebSocket entre dispositivos) ──
# Funciona no plano Workers Free (com Durable Objects activados no dashboard)
[durable_objects]
bindings = [
  { name = "SYNC_ROOM", class_name = "SyncRoom" }
]

# Migração inicial — obrigatório na primeira vez que se adiciona um DO
[[migrations]]
tag     = "v1"
new_sqlite_classes = ["SyncRoom"]

# ── KV Namespace (backup cloud cifrado) — OPCIONAL ──
# Se não usas backup cloud, deixa esta secção comentada.
# Para activar: corre os dois comandos abaixo e substitui os IDs gerados.
#
#   wrangler kv:namespace create BACKUP_KV
#   wrangler kv:namespace create BACKUP_KV --preview
#
# Depois descomenta e preenche:
#
# [[kv_namespaces]]
# binding    = "BACKUP_KV"
# id         = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# preview_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ── Variáveis de ambiente ──
# Definir em: Cloudflare Dashboard → Workers → shiftcare → Settings → Variables
# GROQ_API_KEY   = "gsk_..."   (obrigatório para IA)
# LS_API_KEY     = "..."       (opcional — validação de licenças Lemon Squeezy)
